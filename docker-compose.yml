services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: facial-recognition-frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: facial-recognition-backend
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      BACKEND_WEIGHTS_DIR: /app/weights
      BACKEND_CAPTURES_DIR: /app/captures/screenshots
      BACKEND_USE_TRITON: "true"
      TRITON_URL: triton:8000
      MONGODB_URI: mongodb://faceguard:faceguard@mongodb:27017/?authSource=admin
      MONGODB_DATABASE: faceguard
    volumes:
      - ./backend/app/configs:/app/app/configs:ro
      - ./backend/weights:/app/weights:ro
      - captures_data:/app/captures/screenshots
    depends_on:
      qdrant:
        condition: service_started
      triton:
        condition: service_started
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  triton:
    image: nvcr.io/nvidia/tritonserver:26.04-py3
    container_name: facial-recognition-triton
    command: ["/bin/bash", "/model-repository/start-triton.sh"]
    ports:
      - "8001:8000"
      - "8002:8001"
      - "8003:8002"
    volumes:
      - ./triton_models:/model-repository:ro
      - ./backend/weights:/weights:ro
    shm_size: 1g
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: facial-recognition-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: facial-recognition-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: faceguard
      MONGO_INITDB_ROOT_PASSWORD: faceguard
      MONGO_INITDB_DATABASE: faceguard
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "faceguard", "--password", "faceguard", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
    name: qdrant_data
  captures_data:
    name: captures_data
  mongodb_data:
    name: mongodb_data
